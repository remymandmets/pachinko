name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 95.217.16.18 >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -avz --delete dist/ root@95.217.16.18:/opt/pachinko/dist/
          rsync -avz package.json package-lock.json root@95.217.16.18:/opt/pachinko/

      - name: Restart app
        run: |
          ssh root@95.217.16.18 "cd /opt/pachinko && npm ci && systemctl restart pachinko"
